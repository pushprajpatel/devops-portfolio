name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: ai-search-service

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - run: pytest tests/ -v

  build:
    name: Build (docker)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ai-search-service:ci .
      - name: Save image as artifact for the scan job
        run: docker save ai-search-service:ci -o /tmp/ai-search-service.tar
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/ai-search-service.tar
          retention-days: 1

  scan:
    name: Scan (trivy)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
      - run: docker load -i /tmp/ai-search-service.tar
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ai-search-service:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  push:
    name: Push (GHCR)
    runs-on: ubuntu-latest
    needs: [scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
      - run: docker load -i /tmp/ai-search-service.tar
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag and push
        run: |
          docker tag ai-search-service:ci ghcr.io/${{ github.repository_owner }}/devops-portfolio:latest
          docker tag ai-search-service:ci ghcr.io/${{ github.repository_owner }}/devops-portfolio:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/devops-portfolio:latest
          docker push ghcr.io/${{ github.repository_owner }}/devops-portfolio:${{ github.sha }}
