apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-search-app
  template:
    metadata:
      labels:
        app: ai-search-app
    spec:
      containers:
        - name: app
          image: ai-search-service:ci
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: OLLAMA_HOST
              value: "http://ollama:11434"
            - name: OLLAMA_MODEL
              value: "qwen2.5:7b"
            - name: DB_PATH
              value: "/app/data/products.db"
            - name: IMAGE_DIR
              value: "/app/data/images"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: app-data
              mountPath: /app/data
          # First boot pulls the model into Ollama (can take many minutes) before
          # uvicorn ever starts listening. startupProbe absorbs that slow first
          # start; liveness/readiness only begin once it succeeds once.
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            failureThreshold: 90
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 15
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: app-data
---
apiVersion: v1
kind: Service
metadata:
  name: app
spec:
  selector:
    app: ai-search-app
  ports:
    - port: 8000
      targetPort: 8000
  type: NodePort
