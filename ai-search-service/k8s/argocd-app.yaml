apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-search-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pushprajpatel/devops-portfolio
    targetRevision: main
    path: ai-search-service/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
