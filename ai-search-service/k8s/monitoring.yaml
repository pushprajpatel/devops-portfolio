apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']

    rule_files:
      - /etc/prometheus/alerts.yml

    scrape_configs:
      - job_name: ai-search-app
        static_configs:
          - targets: ['app:8000']

  alerts.yml: |
    groups:
      - name: ai-search-app
        rules:
          - alert: AppDown
            expr: up{job="ai-search-app"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "StyleAI app is down"
              description: "The ai-search-app target has been unreachable for more than 1 minute."

          - alert: HighErrorRate
            expr: |
              sum(rate(http_requests_total{status_code=~"5.."}[5m]))
              /
              sum(rate(http_requests_total[5m])) > 0.05
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High 5xx error rate (> 5%)"
              description: "Error rate is {{ humanizePercentage $value }} over the last 5 minutes."

          - alert: HighLatencyP95
            expr: |
              histogram_quantile(0.95,
                sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
              ) > 1.0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "p95 latency exceeds 1s"
              description: "95th percentile latency is {{ $value | humanizeDuration }}."
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'default'
    receivers:
      - name: 'default'
        webhook_configs: []
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:latest
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
          ports:
            - containerPort: 9093
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: NodePort
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: default
        folder: ''
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  styleai.json: |
    {
      "title": "StyleAI — FastAPI Metrics",
      "uid": "styleai-fastapi",
      "schemaVersion": 38,
      "refresh": "15s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [{
            "expr": "sum(rate(http_requests_total[1m])) by (handler)",
            "legendFormat": "{{handler}}",
            "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
          }],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 2,
          "title": "Latency Percentiles (p50 / p95 / p99)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket[2m])) by (le))",
              "legendFormat": "p50",
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[2m])) by (le))",
              "legendFormat": "p95",
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[2m])) by (le))",
              "legendFormat": "p99",
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 3,
          "title": "Error Rate (4xx + 5xx %)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [{
            "expr": "sum(rate(http_requests_total{status_code=~\"[45]..\"}[2m])) / sum(rate(http_requests_total[2m])) * 100",
            "legendFormat": "error %",
            "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
          }],
          "fieldConfig": { "defaults": { "unit": "percent", "max": 100 } }
        },
        {
          "id": 4,
          "title": "In-Progress Requests",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [{
            "expr": "http_requests_in_progress",
            "legendFormat": "in-progress",
            "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
          }],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 5,
          "title": "Total Requests",
          "type": "stat",
          "gridPos": { "x": 0, "y": 16, "w": 6, "h": 4 },
          "targets": [{
            "expr": "sum(http_requests_total)",
            "legendFormat": "total",
            "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
          }],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 6,
          "title": "Prometheus Target",
          "type": "stat",
          "gridPos": { "x": 6, "y": 16, "w": 6, "h": 4 },
          "targets": [{
            "expr": "up{job=\"ai-search-app\"}",
            "legendFormat": "up",
            "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ]
            }
          }
        }
      ],
      "templating": {
        "list": [{
          "name": "DS_PROMETHEUS",
          "type": "datasource",
          "query": "prometheus",
          "hide": 2
        }]
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: grafana-data
          emptyDir: {}
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
  type: NodePort
